<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<th:block th:each="board: ${boards}">
    <a th:href="@{/board/{id}(id=${board.id}) }">
        <div class="body" th:id="${board.id}">
            <span th:text="${board.title}"></span>
            <span th:text="${board.view}"></span>
        </div>
    </a>
</th:block>
</body>
</html>
